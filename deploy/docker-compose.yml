services:
  db:
    image: postgres:18
    container_name: novascans-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manga
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d manga"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: novascans-api
    restart: unless-stopped
    environment:
      APP_ENV: local
      APP_PORT: 8080
      APP_VERSION: ${APP_VERSION:?APP_VERSION is required}
      DB_MAIN_DSN: postgres://postgres:postgres@db:5432/manga?sslmode=disable
      DB_TEST_DSN: postgres://postgres:postgres@db:5432/manga_test?sslmode=disable
      DB_MAX_CONNS: 10
      DB_CONNECT_TIMEOUT: 5s
      HTTP_SHUTDOWN_TIMEOUT: 10s
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
